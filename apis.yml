apis:
  - aid: opay:opay-cashier-api
    name: OPay Cashier API
    description: >-
      The OPay Cashier API is the primary merchant payment API behind OPay
      Checkout. It exposes a hosted Express Checkout endpoint (cashier/create
      returning a cashierUrl), server-to-server payment creation for 3DS bank
      cards, bank transfer, bank USSD, bank account, POS, OPay wallet QR, and
      reference code payments, plus status queries, cancel, refund, and
      refund-status operations. Authentication uses an Authorization Bearer
      token — the public key for cashier/create and an HMAC-SHA512 signature
      over the JSON body (signed with the merchant's private key) for all
      other endpoints — along with a MerchantId header.
    humanURL: https://documentation.opaycheckout.com/
    baseURL: https://liveapi.opaycheckout.com/api/v1/international
