aid: opay
name: OPay
description: >-
  OPay is a Nigerian mobile money and fintech super-app operated by Blue Ridge
  Microfinance Bank (OPay Digital Services Limited) and majority-owned by Opera
  Limited with backing from SoftBank Vision Fund 2, Sequoia China, DragonBall
  Capital, and 9F Group. Launched in 2018 and headquartered in Lagos, OPay
  serves tens of millions of Nigerian consumers, merchants, and agents with
  wallet accounts, free interbank transfers, the OPay Debit Card, OWealth
  (daily-interest savings powered by OPay Microfinance Bank), bill payments,
  airtime/data top-ups, BNPL (OBuy / OPay Easy Buy), and the OPay POS / agent
  banking network. For developers and merchants, OPay exposes the OPay Cashier
  / OPay Checkout API — a REST API for accepting payments via 3DS bank cards,
  bank transfer, USSD, bank account, POS, OPay wallet QR, and reference codes,
  with hosted Express Checkout, server-to-server APIs, callback webhooks,
  refund and query operations, a PHP gateway SDK, and a WooCommerce plugin.
  Sandbox and production environments are available at testapi.opaycheckout.com
  and liveapi.opaycheckout.com, with HMAC-SHA512 signature authentication and
  per-merchant public/private key pairs issued from the OPay merchant
  dashboard.
